{{#
    White line glyph keyed by tracker tint. Decorative; always paired
    with a visible text label. Sits inside a gradient icon medallion.
#}}
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
{{ if tint == 'fluid' }}
    <path d="M12 3.5c3.5 4 6 6.8 6 9.8a6 6 0 0 1-12 0c0-3 2.5-5.8 6-9.8Z" stroke="#fff" stroke-width="1.9" stroke-linejoin="round"/>
{{ elseif tint == 'food' }}
    <path d="M12 8c-1.6-2.4-5.4-2.7-6.8.4-1.3 2.9.6 6.6 3.2 8.6 1.4 1.1 2.6 1.6 3.6 1.6s2.2-.5 3.6-1.6c2.6-2 4.5-5.7 3.2-8.6-1.4-3.1-5.2-2.8-6.8-.4Z" stroke="#fff" stroke-width="1.9" stroke-linejoin="round"/>
    <path d="M12 8V4.5M12 4.5c1-1.4 2.6-1.5 3.4-1.4" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
{{ elseif tint == 'meds' }}
    <rect x="3.2" y="8.5" width="17.6" height="7" rx="3.5" transform="rotate(-40 12 12)" stroke="#fff" stroke-width="1.9"/>
    <path d="M9.2 8.2l5.6 5.6" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
{{ elseif tint == 'symptoms' }}
    <path d="M3 12h4l2-5 3 10 2.4-5H21" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
{{ elseif tint == 'sleep' }}
    <path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z" stroke="#fff" stroke-width="1.9" stroke-linejoin="round"/>
{{ elseif tint == 'appts' }}
    <rect x="4" y="5.5" width="16" height="14.5" rx="2.5" stroke="#fff" stroke-width="1.9"/>
    <path d="M4 10h16M8.5 3.5v3.5M15.5 3.5v3.5" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
    <path d="M8.5 14.5l2 2 3.5-3.5" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
{{ else }}
    <circle cx="12" cy="12" r="3.2" stroke="#fff" stroke-width="1.9"/>
    <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/>
{{ /if }}
</svg>
