{{ partial:section :background="background" :section_id="section_id" tight="true" }}
    <div class="mx-auto max-w-6xl px-6">
        {{ if heading }}<h2 class="heading-md" data-reveal>{{ heading }}</h2>{{ /if }}
        <div class="mt-8 grid gap-5 md:grid-cols-3">
            {{ cards }}
                <a href="{{ link }}" class="group glass-solid p-6 h-full transition hover:-translate-y-0.5 hover:shadow-lift-lg" data-reveal style="--reveal-index: {{ index }}">
                    <h3 class="heading-sm font-sans font-bold flex items-start justify-between gap-3">
                        {{ title }}
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" class="mt-1 shrink-0 text-cobalt-500 transition-transform group-hover:translate-x-1">
                            <path d="M3 9h12m0 0L10 4m5 5l-5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </h3>
                    <p class="mt-2 text-[1rem] text-ink-600">{{ text }}</p>
                </a>
            {{ /cards }}
        </div>
    </div>
{{ /partial:section }}
