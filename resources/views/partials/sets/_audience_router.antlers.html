{{ partial:section :background="background" :section_id="section_id" tight="true" }}
    <div class="mx-auto max-w-6xl px-6">
        {{ if heading }}<h2 class="heading-md" data-reveal>{{ heading }}</h2>{{ /if }}
        <div class="mt-8 grid gap-4 md:grid-cols-3">
            {{ cards }}
                <a href="{{ link }}" class="bento-tile group !p-6" data-reveal style="--reveal-index: {{ index }}; --tile-glow: rgb(91 134 255 / 0.16); --tile-dot: #5b86ff">
                    <p class="bento-label"><b>0{{ index | add:1 }}</b></p>
                    <h3 class="heading-sm font-sans font-bold mt-4 flex items-start justify-between gap-3 text-ink-900">
                        {{ title }}
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" class="mt-1 shrink-0 text-cobalt-300 transition-transform group-hover:translate-x-1">
                            <path d="M3 9h12m0 0L10 4m5 5l-5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </h3>
                    <p class="mt-2 text-[1rem] text-ink-600">{{ text }}</p>
                </a>
            {{ /cards }}
        </div>
    </div>
{{ /partial:section }}
