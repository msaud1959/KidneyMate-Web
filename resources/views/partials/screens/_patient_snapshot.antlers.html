{{# Compact patient app snapshot for a bento tile. Decorative. #}}
<div class="surface-light h-full rounded-[1.15rem] p-4 flex flex-col" style="background:linear-gradient(180deg,#f7f9fd 0%,#eef2f9 100%)" aria-hidden="true">
    <div class="flex items-center justify-between">
        <div>
            <p class="text-[10.5px] font-semibold text-ink-400">Wednesday, 3 July</p>
            <p class="text-[16px] font-bold text-ink-900 leading-none mt-0.5">Your day</p>
        </div>
        <span class="grid place-items-center w-7 h-7 rounded-full bg-gradient-to-br from-cobalt-500 to-cobalt-700 text-white text-[11px] font-bold">S</span>
    </div>

    <div class="mt-3 flex items-center gap-3 rounded-xl bg-white border border-cloud-200 p-2.5">
        <svg width="44" height="44" viewBox="0 0 50 50" class="shrink-0" aria-hidden="true">
            <circle cx="25" cy="25" r="21" fill="none" stroke="#fbe1e6" stroke-width="5"/>
            <circle cx="25" cy="25" r="21" fill="none" stroke="#e0345a" stroke-width="5" stroke-linecap="round" stroke-dasharray="131.9" stroke-dashoffset="33" transform="rotate(-90 25 25)"/>
            <circle cx="25" cy="25" r="14.5" fill="none" stroke="#dcefe9" stroke-width="5"/>
            <circle cx="25" cy="25" r="14.5" fill="none" stroke="#2fae8f" stroke-width="5" stroke-linecap="round" stroke-dasharray="91.1" stroke-dashoffset="18" transform="rotate(-90 25 25)"/>
            <circle cx="25" cy="25" r="8" fill="none" stroke="#dce8fb" stroke-width="5"/>
            <circle cx="25" cy="25" r="8" fill="none" stroke="#2e6cb5" stroke-width="5" stroke-linecap="round" stroke-dasharray="50.3" stroke-dashoffset="13" transform="rotate(-90 25 25)"/>
        </svg>
        <div class="min-w-0">
            <p class="text-[11.5px] font-bold text-ink-900">Today's routine</p>
            <p class="text-[10px] text-ink-400 leading-snug">Fluid, medication, evening check-in</p>
            <p class="text-[10.5px] font-semibold text-cobalt-600 mt-0.5">3 of 4 done</p>
        </div>
    </div>

    <div class="mt-2.5 grid grid-cols-3 gap-1.5">
        <div class="rounded-lg bg-white border border-cloud-200 p-2">
            <p class="text-[9px] font-semibold" style="color:#2e6cb5">Fluid</p>
            <p class="text-[13px] font-bold text-ink-900 leading-none mt-0.5">70%</p>
        </div>
        <div class="rounded-lg bg-white border border-cloud-200 p-2">
            <p class="text-[9px] font-semibold" style="color:#b5455a">Meds</p>
            <p class="text-[13px] font-bold text-ink-900 leading-none mt-0.5">3/4</p>
        </div>
        <div class="rounded-lg bg-white border border-cloud-200 p-2">
            <p class="text-[9px] font-semibold" style="color:#6152b8">Sleep</p>
            <p class="text-[13px] font-bold text-ink-900 leading-none mt-0.5">7h</p>
        </div>
    </div>

    <div class="mt-auto pt-2.5">
        <div class="rounded-lg border border-cloud-200 bg-white p-2.5">
            <p class="text-[10px] font-bold text-ink-900">Plain-language insight</p>
            <p class="text-[10px] text-ink-600 leading-snug mt-0.5">You've been just over your fluid target on warm days. Tap to see why.</p>
        </div>
    </div>
</div>
