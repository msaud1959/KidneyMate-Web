# Netlify build for the KidneyMate static site.
# Netlify installs PHP + Composer + Node, builds the assets, then renders
# the whole Statamic site to static HTML in storage/app/static, which is
# what gets served. The waitlist and contact forms are picked up by
# Netlify Forms automatically (see the hidden form-name fields).

[build]
  publish = "storage/app/static"
  # APP_URL is set from Netlify's own $URL so canonical/OG tags use the live
  # domain; ASSET_URL="/" keeps CSS/JS/image paths root-relative so they work
  # on any domain.
  command = """
    composer install --no-dev --optimize-autoloader --no-interaction \
    && cp -n .env.example .env \
    && php artisan key:generate --force \
    && export APP_URL="${URL:-http://localhost}" \
    && npm ci \
    && npm run build \
    && php please ssg:generate
  """

[build.environment]
  PHP_VERSION = "8.3"
  NODE_VERSION = "20"
  ASSET_URL = "/"

# Long-cache the fingerprinted build assets and images.
[[headers]]
  for = "/build/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
